services:
  - type: web
    name: chaidoru
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FASHN_API_KEY
        sync: false
      - key: RAKUTEN_APP_ID
        sync: false
      - key: RAKUTEN_ACCESS_KEY
        sync: false
      - key: RAKUTEN_AFFILIATE_ID
        sync: false
      - key: HF_TOKEN
        sync: false
